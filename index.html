<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Big Stretch — Puppy Training Made Easy</title>
  <meta name="description" content="Track potty breaks, master training commands, and watch your puppy grow with streaks, XP, and a personalized Puppy Score.">
  <meta property="og:title" content="Big Stretch — Puppy Training Made Easy">
  <meta property="og:description" content="The gamified puppy training tracker. Potty logs, training commands, streaks, and badges.">
  <meta property="og:image" content="https://bigstretchapp.com/og-image.png">
  <meta property="og:url" content="https://bigstretchapp.com">
  <meta name="twitter:card" content="summary_large_image">
  <link rel="icon" type="image/png" href="logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --orange: #FF8C42;
      --orange-dark: #E8751F;
      --black: #1A1A1A;
      --gray: #777777;
      --gray-light: #B0B0B0;
      --border: #E5E5E5;
      --white: #FFFFFF;
      --heading: 'Nunito', -apple-system, BlinkMacSystemFont, sans-serif;
      --sans: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    body {
      font-family: var(--sans);
      color: var(--black);
      background: var(--white);
      -webkit-font-smoothing: antialiased;
    }

    /* ── Nav ──────────────────────────────────────────────── */
    nav {
      padding: 24px 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .nav-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: var(--sans);
      font-size: 18px;
      font-weight: 700;
      color: var(--black);
      text-decoration: none;
      letter-spacing: -0.02em;
    }

    .nav-logo img {
      width: 36px;
      height: 36px;
      border-radius: 8px;
    }

    /* ── Hero ─────────────────────────────────────────────── */
    .hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 60px 32px 0;
      gap: 24px;
    }

    .hero h1 {
      font-family: var(--heading);
      font-size: clamp(40px, 7vw, 80px);
      font-weight: 900;
      line-height: 1.1;
      letter-spacing: -0.02em;
    }

    .hero p {
      font-size: clamp(15px, 1.6vw, 18px);
      color: var(--gray);
      line-height: 1.6;
      max-width: 460px;
    }

    .app-store-link {
      display: inline-block;
      transition: transform 0.2s;
    }

    .app-store-link:hover { transform: scale(1.05); }
    .app-store-link img { height: 52px; }

    .hero-note {
      font-size: 13px;
      color: var(--gray-light);
    }

    /* ── Screenshots ──────────────────────────────────────── */
    .phones {
      padding: 40px 32px 60px;
      display: flex;
      justify-content: center;
      align-items: flex-end;
      overflow: hidden;
    }

    .phone {
      flex-shrink: 0;
      transition: transform 0.4s ease;
    }

    .phone img {
      width: 100%;
      height: auto;
      display: block;
    }

    .phone:nth-child(1) {
      width: 180px;
      transform: rotate(-8deg) translateY(16px);
      z-index: 1;
    }

    .phone:nth-child(2) {
      width: 200px;
      transform: translateY(0);
      z-index: 3;
      margin: 0 -24px;
    }

    .phone:nth-child(3) {
      width: 180px;
      transform: rotate(8deg) translateY(16px);
      z-index: 1;
    }

    /* ── Footer ───────────────────────────────────────────── */
    footer {
      padding: 20px 48px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .footer-left {
      font-size: 13px;
      color: var(--gray-light);
    }

    .footer-right {
      display: flex;
      gap: 24px;
    }

    .footer-right a {
      font-size: 13px;
      color: var(--gray);
      text-decoration: none;
      transition: color 0.2s;
    }

    .footer-right a:hover { color: var(--black); }

    /* ── Responsive ────────────────────────────────────────── */
    @media (max-width: 860px) {
      nav { padding: 20px 24px; }
      .hero { padding: 40px 24px 0; }
      .phones { padding: 20px 16px 40px; }
      .phone:nth-child(1) { width: 140px; }
      .phone:nth-child(2) { width: 160px; margin: 0 -16px; }
      .phone:nth-child(3) { width: 140px; }
      footer {
        flex-direction: column;
        gap: 8px;
        text-align: center;
        padding: 16px 24px;
      }
    }

    @media (max-width: 480px) {
      .phone:nth-child(1),
      .phone:nth-child(3) { display: none; }
      .phone:nth-child(2) { transform: none; margin: 0; width: 240px; }
    }
  </style>
</head>
<body>

  <nav>
    <a href="/" class="nav-logo"><img src="logo.png" alt="Big Stretch logo">Big Stretch</a>
  </nav>

  <section class="hero">
    <h1>Your puppy's first year, sorted.</h1>
    <p>Potty tracking, training commands, feeding logs, and daily streaks — everything new puppy parents need in one app.</p>
    <a href="https://apps.apple.com/app/big-stretch" class="app-store-link" target="_blank" rel="noopener">
      <img src="https://developer.apple.com/assets/elements/badges/download-on-the-app-store.svg" alt="Download on the App Store">
    </a>
    <div class="hero-note">Free 7-day trial · Cancel anytime</div>

    <div class="phones">
      <div class="phone">
        <img src="screenshot-1.png" alt="Today screen" loading="lazy">
      </div>
      <div class="phone">
        <img src="screenshot-2.png" alt="Practice screen" loading="lazy">
      </div>
      <div class="phone">
        <img src="screenshot-3.png" alt="Progress screen" loading="lazy">
      </div>
    </div>
  </section>

  <footer>
    <span class="footer-left">&copy; 2026 Pia Industries LLC</span>
    <div class="footer-right">
      <a href="/privacy">Privacy</a>
      <a href="/terms">Terms</a>
      <a href="/support">Support</a>
    </div>
  </footer>

</body>
</html>
